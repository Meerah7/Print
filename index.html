<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print Service</title>

    <link rel="stylesheet" href="style.css">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="card">

        <h2>Upload Document</h2>

        <input type="file" id="fileInput" accept="application/pdf" />
        <p id="fileName"></p>
        <p id="pageCount"></p>

        <h3>Print Settings</h3>

        <label>Print Type</label>
        <select id="printType">
            <option value="bw">Black & White</option>
            <option value="color">Color</option>
        </select>

        <label>Copies</label>
        <input type="number" id="copies" value="1" min="1" />

        <label>Page Range (e.g. 1-3,5)</label>
        <input type="text" id="pageRange" placeholder="Leave empty for all pages">

        <div class="price-box">
            <p id="price">₹0</p>
            <span>Total Price</span>
        </div>

        <button onclick="saveOrder()">Save Order</button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="preview-section">

        <h2>Document Preview</h2>

        <!-- Loader -->
        <div id="loader" class="hidden">Loading PDF...</div>

        <!-- Scrollable PDF -->
        <div id="pdfContainer"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
