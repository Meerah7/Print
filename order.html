<h2>Orders List</h2>

<table border="1">
<thead>
<tr>
<th>File</th>
<th>Pages</th>
<th>Copies</th>
<th>Type</th>
<th>Price</th>
<th>Date</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>
</table>

<script>
async function loadOrders() {
    try {
        const res = await fetch("https://print-module-w45w.onrender.com/orders");
        const data = await res.json();

        const table = document.getElementById("ordersTable");

        table.innerHTML = ""; // ✅ CLEAR OLD DATA

        if (data.length === 0) {
            table.innerHTML = "<tr><td colspan='6'>No orders found</td></tr>";
            return;
        }

        data.forEach(order => {
            table.innerHTML += `
            <tr>
                <td>${order.fileName}</td>
                <td>${order.pages}</td>
                <td>${order.copies}</td>
                <td>${order.type}</td>
                <td>₹${order.price}</td>
                <td>${new Date(order.date).toLocaleString()}</td>
            </tr>`;
        });

    } catch (err) {
        console.error(err);
        alert("Failed to load orders");
    }
}

loadOrders();
</script>
